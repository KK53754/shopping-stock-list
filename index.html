<!DOCTYPE html>
<html lang="ja">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <title>買い物リスト</title>
  <link rel="manifest" href="/shopping-stock-list/manifest.webmanifest">
  <meta name="theme-color" content="#5A5A40">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <link rel="apple-touch-icon" href="/shopping-stock-list/icons/icon-192v2.png">
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <script
    type="importmap">{"imports":{"react":"https://esm.sh/react@18.2.0","react-dom/client":"https://esm.sh/react-dom@18.2.0/client","lucide-react":"https://esm.sh/lucide-react@0.344.0?external=react,react-dom"}}</script>
  <style>
    body {
      font-family: 'Helvetica Neue', Arial, 'Hiragino Kaku Gothic ProN', 'Hiragino Sans', Meiryo, sans-serif;
      -webkit-tap-highlight-color: transparent;
      overscroll-behavior-y: contain;
      overflow-x: hidden;
    }

    ::-webkit-scrollbar { width: 6px }
    ::-webkit-scrollbar-track { background: transparent }
    ::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 10px }

    @keyframes spin { to { transform: rotate(360deg) } }
    .spin { animation: spin 1s linear infinite }
    @keyframes slideUp { from { transform: translateY(100%); opacity: 0 } to { transform: translateY(0); opacity: 1 } }
    .slide-up { animation: slideUp .25s ease-out }
    @keyframes fadeIn { from { opacity: 0; transform: translateY(-6px) } to { opacity: 1; transform: translateY(0) } }
    .fade-in { animation: fadeIn .2s ease-out }

    .ptr-indicator { transition: height .15s ease, opacity .15s ease }
    
    /* スワイプコンテナ */
    .view-container {
      display: flex;
      width: 200%;
      transition: transform 0.3s cubic-bezier(0.16, 1, 0.3, 1);
      will-change: transform;
    }
    .view-pane {
      width: 50%;
      flex-shrink: 0;
    }
  </style>
</head>

<body class="bg-[#F5F5F0] min-h-screen text-[#4A4A40]">
  <div id="root"></div>
  <script type="text/babel" data-type="module">
    import React, { useState, useEffect, useRef, useCallback } from 'react';
    import { createRoot } from 'react-dom/client';
    import { Trash2, Plus, ShoppingBag, Circle, Package, Minus, ArrowRight, ShoppingCart, Loader2, Settings, RotateCcw, ChevronDown, ChevronUp, Search, X, Cloud, CloudOff, Check } from 'lucide-react';

    const DEFAULT_GAS_URL = 'https://script.google.com/macros/s/AKfycbxyzCdPHg6TOnEvlAeMPh_8g1WpNSEYGFhM4R5iEMUHlASNPVVazQYaAOW7FC2B42-w/exec';
    const DEFAULT_TOKEN = 'baby2026';

    const CATS = [
      { id: 'vegetables', label: '🥦 野菜・果物' }, { id: 'meat', label: '🥩 肉・魚・卵' }, { id: 'dairy', label: '🥛 乳製品・パン' },
      { id: 'staple', label: '🍚 米・麺・乾物' }, { id: 'drinks', label: '🥤 飲み物' }, { id: 'snacks', label: '🍬 お菓子・デザート' },
      { id: 'frozen', label: '🧊 冷凍食品' }, { id: 'seasoning', label: '🧂 調味料・食材' }, { id: 'daily', label: '🧹 日用品・消耗品' },
      { id: 'baby', label: '👶 ベビー用品' }, { id: 'other', label: '📦 その他' },
    ];

    const genId = () => { try { return crypto.randomUUID() } catch (e) { return Date.now().toString(36) + Math.random().toString(36).substr(2) } };
    const loadSettings = () => { try { const s = localStorage.getItem('app-settings'); return s ? JSON.parse(s) : { gasUrl: DEFAULT_GAS_URL, token: DEFAULT_TOKEN } } catch { return { gasUrl: DEFAULT_GAS_URL, token: DEFAULT_TOKEN } } };

    function SettingsModal({ settings, onSave, onClose }) {
      const [url, setUrl] = useState(settings.gasUrl);
      const [tok, setTok] = useState(settings.token);
      const [show, setShow] = useState(false);
      return (
        <div className="fixed inset-0 z-50 flex items-end bg-black/30" onClick={onClose}>
          <div className="w-full max-w-md mx-auto bg-white rounded-t-3xl p-6 shadow-2xl slide-up" onClick={e => e.stopPropagation()}>
            <div className="flex items-center justify-between mb-5">
              <h2 className="font-bold text-[#3A3A2C] text-lg">⚙️ 接続設定</h2>
              <button onClick={onClose} className="text-[#8A8A70] p-1"><X size={20} /></button>
            </div>
            <label className="block text-[10px] font-bold tracking-widest text-[#8A8A70] uppercase mb-1">GAS URL</label>
            <textarea value={url} onChange={e => setUrl(e.target.value)} rows={3} placeholder="https://script.google.com/macros/s/..." className="w-full border-2 border-[#D9D9C8] rounded-xl px-3 py-2 text-xs mb-4 focus:outline-none focus:ring-2 focus:ring-[#5A5A40] resize-none" />
            <label className="block text-[10px] font-bold tracking-widest text-[#8A8A70] uppercase mb-1">アクセストークン</label>
            <div className="relative mb-5">
              <input type={show ? 'text' : 'password'} value={tok} onChange={e => setTok(e.target.value)} className="w-full border-2 border-[#D9D9C8] rounded-xl px-3 py-2.5 text-sm pr-14 focus:outline-none focus:ring-2 focus:ring-[#5A5A40]" />
              <button onClick={() => setShow(!show)} className="absolute right-3 top-1/2 -translate-y-1/2 text-xs text-[#5A5A40] font-bold">{show ? '隠す' : '表示'}</button>
            </div>
            <button onClick={() => onSave({ gasUrl: url.trim(), token: tok.trim() })} className="w-full bg-[#5A5A40] text-white py-3 rounded-xl font-bold text-sm hover:bg-[#4A4A30] active:scale-[.98] transition-all">保存して再接続</button>
            <p className="text-center text-[10px] text-[#8A8A70] mt-3">設定はこのデバイスのみに保存されます</p>
          </div>
        </div>
      );
    }

    function App() {
      const [settings, setSettings] = useState(loadSettings);
      const [items, setItems] = useState([]);
      const [isLoading, setIsLoading] = useState(true);
      const [syncStatus, setSyncStatus] = useState('idle');
      const [activeTab, setActiveTab] = useState('shopping');
      const [inputValue, setInputValue] = useState('');
      const [selCat, setSelCat] = useState('other');
      const [showSettings, setShowSettings] = useState(false);
      const [collapsed, setCollapsed] = useState({});
      const [search, setSearch] = useState('');
      const [pullY, setPullY] = useState(0);
      const [refreshing, setRefreshing] = useState(false);
      const [offsetX, setOffsetX] = useState(0);
      const [isSwiping, setIsSwiping] = useState(false);

      const isInit = useRef(true);
      const touchY = useRef(0);
      const touchX = useRef(0);
      const swipeDir = useRef(null);
      const containerRef = useRef(null);
      const { gasUrl, token } = settings;

      const migrateItem = item => ({
        id: item.id, text: item.text,
        status: item.status || (item.checked ? 'stock' : 'shopping'),
        stockCount: item.stockCount ?? (item.checked ? 1 : 0),
        category: item.category || 'other'
      });

      const fromLS = useCallback(() => {
        try {
          const s = localStorage.getItem('shopping-list');
          if (s) { const d = JSON.parse(s).map(migrateItem); if (d.length) return d; }
        } catch { }
        return [{ id: genId(), text: '牛乳', status: 'shopping', stockCount: 0, category: 'dairy' }];
      }, []);

      const loadData = useCallback(async () => {
        setIsLoading(true);
        let loaded = false;
        const controller = new AbortController();
        const timeoutId = setTimeout(() => controller.abort(), 5000);
        if (gasUrl && token) {
          try {
            const r = await fetch(`${gasUrl}?token=${token}`, { signal: controller.signal });
            const d = await r.json();
            clearTimeout(timeoutId);
            if (d.error) throw new Error(d.error);
            setItems(Array.isArray(d) && d.length ? d.map(migrateItem) : fromLS());
            loaded = true;
          } catch (e) { console.error('通信失敗', e); }
        }
        if (!loaded) setItems(fromLS());
        setIsLoading(false);
        clearTimeout(timeoutId);
      }, [gasUrl, token, fromLS]);

      useEffect(() => { loadData(); }, [loadData]);

      useEffect(() => {
        if (isLoading) return;
        if (isInit.current) { isInit.current = false; return; }
        setSyncStatus('saving');
        const id = setTimeout(async () => {
          try {
            if (gasUrl && token) {
              await fetch(gasUrl, { method: 'POST', headers: { 'Content-Type': 'text/plain' }, body: JSON.stringify({ token, data: JSON.stringify(items) }) });
            } else { localStorage.setItem('shopping-list', JSON.stringify(items)); }
            setSyncStatus('saved'); setTimeout(() => setSyncStatus('idle'), 2000);
          } catch (e) { console.error('保存エラー', e); setSyncStatus('error'); localStorage.setItem('shopping-list', JSON.stringify(items)); }
        }, 1000);
        return () => clearTimeout(id);
      }, [items, isLoading]);

      // インタラクティブ・スワイプ
      const onTouchStart = e => {
        touchY.current = e.touches[0].clientY;
        touchX.current = e.touches[0].clientX;
        swipeDir.current = null;
        setIsSwiping(false);
      };
      const onTouchMove = e => {
        const dx = e.touches[0].clientX - touchX.current;
        const dy = e.touches[0].clientY - touchY.current;
        if (!swipeDir.current) {
          if (Math.abs(dx) > Math.abs(dy) + 10) swipeDir.current = 'h';
          else if (Math.abs(dy) > Math.abs(dx) + 10) swipeDir.current = 'v';
        }
        if (swipeDir.current === 'h') {
          setIsSwiping(true);
          // 端での抵抗感
          if ((activeTab === 'shopping' && dx > 0) || (activeTab === 'stock' && dx < 0)) {
            setOffsetX(dx * 0.2);
          } else {
            setOffsetX(dx);
          }
        }
        if (swipeDir.current === 'v' && window.scrollY <= 5 && dy > 0) setPullY(Math.min(dy, 90));
      };
      const onTouchEnd = async e => {
        const dx = e.changedTouches[0].clientX - touchX.current;
        if (swipeDir.current === 'h') {
          if (Math.abs(dx) > 100) {
            if (dx < 0 && activeTab === 'shopping') setActiveTab('stock');
            else if (dx > 0 && activeTab === 'stock') setActiveTab('shopping');
          }
        }
        if (swipeDir.current === 'v' && pullY >= 70) { setRefreshing(true); await loadData(); setRefreshing(false); }
        setOffsetX(0);
        setPullY(0);
        setIsSwiping(false);
      };

      const sendNotif = (title, body) => {
        if ('serviceWorker' in navigator && Notification.permission === 'granted') {
          navigator.serviceWorker.ready.then(reg => reg.showNotification(title, { body, icon: '/shopping-stock-list/icons/icon-192v2.png' }));
        }
      };

      const handleAdd = e => {
        e.preventDefault(); const t = inputValue.trim(); if (!t) return;
        setItems([{ id: genId(), text: t, status: activeTab, stockCount: activeTab === 'stock' ? 1 : 0, category: selCat }, ...items]);
        setInputValue('');
        sendNotif('追加しました', t);
      };
      const markBought = id => {
        const item = items.find(i => i.id === id);
        setItems(items.map(i => i.id === id ? { ...i, status: 'stock', stockCount: Math.max(1, (i.stockCount || 0) + 1) } : i));
        setActiveTab('stock');
        if (item) sendNotif('購入しました', item.text);
      };
      const markOut = id => {
        const item = items.find(i => i.id === id);
        setItems(items.map(i => i.id === id ? { ...i, status: 'shopping', stockCount: 0 } : i));
        setActiveTab('shopping');
        if (item) sendNotif('欠品登録', item.text);
      };
      const updStock = (id, d) => setItems(items.map(i => i.id === id ? { ...i, stockCount: Math.max(0, (i.stockCount || 0) + d) } : i));
      const del = id => { if (window.confirm('削除しますか？')) setItems(items.filter(i => i.id !== id)); };
      const toggleCat = id => setCollapsed(p => ({ ...p, [id]: !p[id] }));

      useEffect(() => { if (Notification.permission === 'default') Notification.requestPermission(); }, []);

      const SyncIcon = () => {
        if (syncStatus === 'saving') return <Loader2 size={14} className="spin text-[#8A8A70]" />;
        if (syncStatus === 'saved') return <Check size={14} className="text-green-500" />;
        return (gasUrl && token ? <Cloud size={14} className="text-[#C8C8B0]" /> : <CloudOff size={14} className="text-[#C8C8B0]" />);
      };

      if (isLoading) return <div className="flex flex-col items-center justify-center min-h-[80vh] text-[#8A8A70]"><Loader2 size={32} className="spin text-[#5A5A40] mb-3" /><p className="text-sm font-bold">Loading...</p></div>;

      const renderList = (type) => {
        const filtered = items.filter(i => i.status === type && (!search || i.text.includes(search)));
        const grouped = CATS.map(c => ({ ...c, items: filtered.filter(i => (i.category || 'other') === c.id) }));
        if (filtered.length === 0 && !search) return <div className="text-center py-20 text-[#8A8A70] flex flex-col items-center gap-4 opacity-30">{type === 'shopping' ? <ShoppingBag size={64} /> : <Package size={64} />}<p className="text-sm font-bold">{type === 'shopping' ? '買うものはありません' : 'ストックは空です'}</p></div>;
        
        return grouped.map(cat => {
          if (!cat.items.length && !search) return null;
          return (
            <div key={cat.id} className="mb-1">
              <button onClick={() => toggleCat(cat.id)} className="w-full flex items-center justify-between px-3 py-2 rounded-xl hover:bg-[#EBEBE0]">
                <span className="text-xs font-bold text-[#5A5A40] opacity-70 tracking-wide">{cat.label}</span>
                <span className="text-[10px] bg-[#5A5A40]/10 text-[#5A5A40] rounded-full px-2 py-0.5 font-bold">{cat.items.length}</span>
              </button>
              {!collapsed[cat.id] && <div className="space-y-1.5 mt-1 mb-2">
                {cat.items.map(item => (
                  <div key={item.id} className="group flex items-center gap-2 bg-white px-3 py-2 rounded-xl shadow-sm border border-[#EBEBE0]">
                    {type === 'shopping' ? (
                      <><button onClick={() => markBought(item.id)} className="text-[#D9D9C8] active:scale-90"><Circle size={20} /></button><span className="flex-1 text-sm font-medium text-[#4A4A30] truncate">{item.text}</span></>
                    ) : (
                      <><span className="flex-1 text-sm font-medium text-[#4A4A30] truncate">{item.text}</span><div className="flex items-center bg-[#F9F9F5] border border-[#D9D9C8] rounded-lg overflow-hidden"><button onClick={() => updStock(item.id, -1)} className="px-2 py-1 text-[#8A8A70] active:bg-[#D9D9C8]"><Minus size={11} /></button><span className="text-xs font-bold text-[#5A5A40] w-6 text-center">{item.stockCount || 0}</span><button onClick={() => updStock(item.id, 1)} className="px-2 py-1 text-[#8A8A70] active:bg-[#D9D9C8]"><Plus size={11} /></button></div><button onClick={() => markOut(item.id)} className="flex items-center gap-1 text-[#5A5A40] px-2 py-1 rounded-lg border border-[#EBEBE0] active:scale-95 text-[10px] font-bold"><ShoppingCart size={11} /><span>欠品</span></button></>
                    )}
                    <button onClick={() => del(item.id)} className="text-[#C8C8B0] hover:text-red-400 p-1 active:scale-90"><Trash2 size={14} /></button>
                  </div>
                ))}
              </div>}
            </div>
          );
        });
      };

      return (
        <div className="max-w-md mx-auto min-h-screen flex flex-col" onTouchStart={onTouchStart} onTouchMove={onTouchMove} onTouchEnd={onTouchEnd}>
          <div className="ptr-indicator flex items-center justify-center bg-[#F5F5F0] overflow-hidden" style={{ height: pullY > 0 ? Math.min(pullY * 0.6, 54) : refreshing ? 48 : 0 }}><RotateCcw size={20} className="text-[#5A5A40] spin" /></div>

          <div className="sticky top-0 z-20 bg-[#F5F5F0]/95 backdrop-blur-sm px-4 pt-4 pb-2">
            <div className="flex items-center justify-between mb-3">
              <div className="flex items-center gap-2"><span className="text-lg font-serif text-[#3A3A2C] font-bold tracking-tight">買い物・ストック</span><SyncIcon /></div>
              <button onClick={() => setShowSettings(true)} className="p-2 rounded-xl bg-white border border-[#EBEBE0] text-[#8A8A70] shadow-sm active:scale-90"><Settings size={18} /></button>
            </div>
            <div className="flex bg-[#EBEBE0] p-1.5 rounded-2xl mb-3">
              {['shopping', 'stock'].map(t => (
                <button key={t} onClick={() => setActiveTab(t)} className={`flex-1 py-2 text-xs font-bold rounded-xl transition-all ${activeTab === t ? 'bg-white text-[#5A5A40] shadow-sm' : 'text-[#8A8A70]'}`}>
                  {t === 'shopping' ? '🛒 買い物' : '📦 ストック'}{t === 'shopping' && shoppingCount > 0 && <span className="ml-1.5 bg-[#5A5A40] text-white text-[10px] rounded-full px-1.5 py-0.5">{shoppingCount}</span>}
                </button>
              ))}
            </div>
            <div className="relative mb-2">
              <Search size={14} className="absolute left-3 top-1/2 -translate-y-1/2 text-[#8A8A70]" />
              <input value={search} onChange={e => setSearch(e.target.value)} placeholder="検索..." className="w-full bg-white border border-[#EBEBE0] rounded-xl pl-8 pr-8 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-[#5A5A40]" />
            </div>
          </div>

          <div className="flex-1 relative overflow-hidden">
            <div 
              className="view-container"
              style={{ 
                transform: `translateX(${(activeTab === 'shopping' ? 0 : -50) + (offsetX / window.innerWidth * 50)}%)`,
                transition: isSwiping ? 'none' : 'transform 0.3s cubic-bezier(0.16, 1, 0.3, 1)'
              }}
            >
              <div className="view-pane px-4 pb-24">
                <div className="bg-white rounded-2xl border border-[#EBEBE0] shadow-sm p-4 mb-4">
                  <form onSubmit={handleAdd} className="flex gap-2 mb-2"><input value={inputValue} onChange={e => setInputValue(e.target.value)} placeholder="買い物に追加..." className="flex-1 border-2 border-dashed border-[#D9D9C8] rounded-xl px-3 py-2.5 text-sm focus:outline-none focus:ring-2 focus:ring-[#5A5A40]" /><button type="submit" className="bg-[#5A5A40] text-white rounded-xl w-11 h-11 flex items-center justify-center flex-shrink-0 active:scale-95"><Plus size={22} /></button></form>
                  <div className="flex gap-1.5 flex-wrap">{CATS.map(c => <button key={c.id} onClick={() => setSelCat(c.id)} className={`text-[10px] px-2 py-1 rounded-lg font-bold transition-all ${selCat === c.id ? 'bg-[#5A5A40] text-white' : 'bg-[#F5F5F0] text-[#8A8A70] border border-[#EBEBE0]'}`}>{c.label}</button>)}</div>
                </div>
                {renderList('shopping')}
              </div>
              <div className="view-pane px-4 pb-24">
                <div className="bg-white rounded-2xl border border-[#EBEBE0] shadow-sm p-4 mb-4">
                  <form onSubmit={handleAdd} className="flex gap-2 mb-2"><input value={inputValue} onChange={e => setInputValue(e.target.value)} placeholder="ストックに追加..." className="flex-1 border-2 border-dashed border-[#D9D9C8] rounded-xl px-3 py-2.5 text-sm focus:outline-none focus:ring-2 focus:ring-[#5A5A40]" /><button type="submit" className="bg-[#5A5A40] text-white rounded-xl w-11 h-11 flex items-center justify-center flex-shrink-0 active:scale-95"><Plus size={22} /></button></form>
                  <div className="flex gap-1.5 flex-wrap">{CATS.map(c => <button key={c.id} onClick={() => setSelCat(c.id)} className={`text-[10px] px-2 py-1 rounded-lg font-bold transition-all ${selCat === c.id ? 'bg-[#5A5A40] text-white' : 'bg-[#F5F5F0] text-[#8A8A70] border border-[#EBEBE0]'}`}>{c.label}</button>)}</div>
                </div>
                {renderList('stock')}
              </div>
            </div>
          </div>
          {showSettings && <SettingsModal settings={settings} onSave={saveSettings} onClose={() => setShowSettings(false)} />}
        </div>
      );
    }

    createRoot(document.getElementById('root')).render(<App />);

    if ('serviceWorker' in navigator) {
      window.addEventListener('load', () => {
        navigator.serviceWorker.register('/shopping-stock-list/sw.js?v=' + Date.now(), { scope: '/shopping-stock-list/' })
          .then(reg => {
            reg.addEventListener('updatefound', () => {
              const newWorker = reg.installing;
              newWorker.addEventListener('statechange', () => {
                if (newWorker.state === 'installed' && navigator.serviceWorker.controller) window.location.reload();
              });
            });
          });
      });
      navigator.serviceWorker.addEventListener('controllerchange', () => window.location.reload());
    }
  </script>
</body>
</html>
