<!DOCTYPE html>
<html lang="ja">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <title>買い物リスト</title>
  <link rel="manifest" href="/shopping-stock-list/manifest.webmanifest">
  <meta name="theme-color" content="#5A5A40">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <link rel="apple-touch-icon" href="/shopping-stock-list/icons/icon-192v2.png">
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <script
    type="importmap">{"imports":{"react":"https://esm.sh/react@18.2.0","react-dom/client":"https://esm.sh/react-dom@18.2.0/client","lucide-react":"https://esm.sh/lucide-react@0.344.0?external=react,react-dom"}}</script>
  <style>
    body {
      font-family: 'Helvetica Neue', Arial, 'Hiragino Kaku Gothic ProN', 'Hiragino Sans', Meiryo, sans-serif;
      -webkit-tap-highlight-color: transparent;
      overscroll-behavior-y: contain;
    }

    ::-webkit-scrollbar {
      width: 6px
    }

    ::-webkit-scrollbar-track {
      background: transparent
    }

    ::-webkit-scrollbar-thumb {
      background: #cbd5e1;
      border-radius: 10px
    }

    @keyframes spin {
      to {
        transform: rotate(360deg)
      }
    }

    .spin {
      animation: spin 1s linear infinite
    }

    @keyframes slideUp {
      from {
        transform: translateY(100%);
        opacity: 0
      }

      to {
        transform: translateY(0);
        opacity: 1
      }
    }

    .slide-up {
      animation: slideUp .25s ease-out
    }

    @keyframes fadeIn {
      from {
        opacity: 0;
        transform: translateY(-6px)
      }

      to {
        opacity: 1;
        transform: translateY(0)
      }
    }

    .fade-in {
      animation: fadeIn .2s ease-out
    }

    .ptr-indicator {
      transition: height .15s ease, opacity .15s ease
    }
  </style>
</head>

<body class="bg-[#F5F5F0] min-h-screen text-[#4A4A40]">
  <div id="root"></div>
  <script type="text/babel" data-type="module">
    import React, { useState, useEffect, useRef, useCallback } from 'react';
    import { createRoot } from 'react-dom/client';
    import { Trash2, Plus, ShoppingBag, Circle, Package, Minus, ArrowRight, ShoppingCart, Loader2, Settings, RotateCcw, ChevronDown, ChevronUp, Search, X, Cloud, CloudOff, Check } from 'lucide-react';

    const DEFAULT_GAS_URL = 'https://script.google.com/macros/s/AKfycbxyzCdPHg6TOnEvlAeMPh_8g1WpNSEYGFhM4R5iEMUHlASNPVVazQYaAOW7FC2B42-w/exec';
    const DEFAULT_TOKEN = 'baby2026';

    const CATS = [
      { id: 'vegetables', label: '🥦 野菜・果物' },
      { id: 'meat', label: '🥩 肉・魚・卵' },
      { id: 'dairy', label: '🥛 乳製品・パン' },
      { id: 'staple', label: '🍚 米・麺・乾物' },
      { id: 'drinks', label: '🥤 飲み物' },
      { id: 'snacks', label: '🍬 お菓子・デザート' },
      { id: 'frozen', label: '🧊 冷凍食品' },
      { id: 'seasoning', label: '🧂 調味料・食材' },
      { id: 'daily', label: '🧹 日用品・消耗品' },
      { id: 'other', label: '📦 その他' },
    ];

    const genId = () => { try { return crypto.randomUUID() } catch (e) { return Date.now().toString(36) + Math.random().toString(36).substr(2) } };

    const loadSettings = () => { try { const s = localStorage.getItem('app-settings'); return s ? JSON.parse(s) : { gasUrl: DEFAULT_GAS_URL, token: DEFAULT_TOKEN } } catch { return { gasUrl: DEFAULT_GAS_URL, token: DEFAULT_TOKEN } } };

    // ---- Settings Modal ----
    function SettingsModal({ settings, onSave, onClose }) {
      const [url, setUrl] = useState(settings.gasUrl);
      const [tok, setTok] = useState(settings.token);
      const [show, setShow] = useState(false);
      return (
        <div className="fixed inset-0 z-50 flex items-end bg-black/30" onClick={onClose}>
          <div className="w-full max-w-md mx-auto bg-white rounded-t-3xl p-6 shadow-2xl slide-up" onClick={e => e.stopPropagation()}>
            <div className="flex items-center justify-between mb-5">
              <h2 className="font-bold text-[#3A3A2C] text-lg">⚙️ 接続設定</h2>
              <button onClick={onClose} className="text-[#8A8A70] p-1"><X size={20} /></button>
            </div>
            <label className="block text-[10px] font-bold tracking-widest text-[#8A8A70] uppercase mb-1">GAS URL</label>
            <textarea value={url} onChange={e => setUrl(e.target.value)} rows={3} placeholder="https://script.google.com/macros/s/..." className="w-full border-2 border-[#D9D9C8] rounded-xl px-3 py-2 text-xs mb-4 focus:outline-none focus:ring-2 focus:ring-[#5A5A40] resize-none" />
            <label className="block text-[10px] font-bold tracking-widest text-[#8A8A70] uppercase mb-1">アクセストークン</label>
            <div className="relative mb-5">
              <input type={show ? 'text' : 'password'} value={tok} onChange={e => setTok(e.target.value)} className="w-full border-2 border-[#D9D9C8] rounded-xl px-3 py-2.5 text-sm pr-14 focus:outline-none focus:ring-2 focus:ring-[#5A5A40]" />
              <button onClick={() => setShow(!show)} className="absolute right-3 top-1/2 -translate-y-1/2 text-xs text-[#5A5A40] font-bold">{show ? '隠す' : '表示'}</button>
            </div>
            <button onClick={() => onSave({ gasUrl: url.trim(), token: tok.trim() })} className="w-full bg-[#5A5A40] text-white py-3 rounded-xl font-bold text-sm hover:bg-[#4A4A30] active:scale-[.98] transition-all">保存して再接続</button>
            <p className="text-center text-[10px] text-[#8A8A70] mt-3">設定はこのデバイスのみに保存されます</p>
          </div>
        </div>
      );
    }

    // ---- Main App ----
    function App() {
      const [settings, setSettings] = useState(loadSettings);
      const [items, setItems] = useState([]);
      const [isLoading, setIsLoading] = useState(true);
      const [syncStatus, setSyncStatus] = useState('idle'); // idle|saving|saved|error
      const [activeTab, setActiveTab] = useState('shopping');
      const [inputValue, setInputValue] = useState('');
      const [selCat, setSelCat] = useState('other');
      const [showSettings, setShowSettings] = useState(false);
      const [collapsed, setCollapsed] = useState({});
      const [search, setSearch] = useState('');
      const [pullY, setPullY] = useState(0);
      const [refreshing, setRefreshing] = useState(false);
      const isInit = useRef(true);
      const touchY = useRef(0);
      const { gasUrl, token } = settings;

      const migrateItem = item => ({
        id: item.id, text: item.text,
        status: item.status || (item.checked ? 'stock' : 'shopping'),
        stockCount: item.stockCount ?? (item.checked ? 1 : 0),
        category: item.category || 'other'
      });

      const fromLS = useCallback(() => {
        try {
          const s = localStorage.getItem('shopping-list');
          if (s) { const d = JSON.parse(s).map(migrateItem); if (d.length) return d; }
        } catch { }
        return [{ id: genId(), text: '牛乳', status: 'shopping', stockCount: 0, category: 'dairy' }, { id: genId(), text: 'ティッシュ', status: 'stock', stockCount: 2, category: 'daily' }];
      }, []);

      const loadData = useCallback(async () => {
        setIsLoading(true);
        if (gasUrl && token) {
          try {
            const r = await fetch(`${gasUrl}?token=${token}`);
            const d = await r.json();
            if (d.error) throw new Error(d.error);
            setItems(Array.isArray(d) && d.length ? d.map(migrateItem) : fromLS());
          } catch (e) { console.error('GAS取得エラー', e); setItems(fromLS()); }
        } else { setItems(fromLS()); }
        setIsLoading(false);
      }, [gasUrl, token, fromLS]);

      useEffect(() => { loadData(); }, [loadData]);

      useEffect(() => {
        if (isLoading) return;
        if (isInit.current) { isInit.current = false; return; }
        setSyncStatus('saving');
        const id = setTimeout(async () => {
          try {
            if (gasUrl && token) {
              await fetch(gasUrl, { method: 'POST', headers: { 'Content-Type': 'text/plain' }, body: JSON.stringify({ token, data: JSON.stringify(items) }) });
            } else { localStorage.setItem('shopping-list', JSON.stringify(items)); }
            setSyncStatus('saved'); setTimeout(() => setSyncStatus('idle'), 2000);
          } catch (e) { console.error('保存エラー', e); setSyncStatus('error'); localStorage.setItem('shopping-list', JSON.stringify(items)); }
        }, 1000);
        return () => clearTimeout(id);
      }, [items, isLoading]);

      const saveSettings = ns => {
        setSettings(ns); localStorage.setItem('app-settings', JSON.stringify(ns));
        setShowSettings(false); isInit.current = true;
        setTimeout(() => { const prev = isLoading; setIsLoading(true); loadData(); }, 100);
      };

      // Pull to refresh
      const onTouchStart = e => { touchY.current = e.touches[0].clientY; };
      const onTouchMove = e => {
        if (window.scrollY > 5) return;
        const dy = e.touches[0].clientY - touchY.current;
        if (dy > 0) setPullY(Math.min(dy, 90));
      };
      const onTouchEnd = async () => {
        if (pullY >= 70) { setRefreshing(true); await loadData(); setRefreshing(false); }
        setPullY(0);
      };

      const handleAdd = e => {
        e.preventDefault(); const t = inputValue.trim(); if (!t) return;
        setItems([{ id: genId(), text: t, status: activeTab, stockCount: activeTab === 'stock' ? 1 : 0, category: selCat }, ...items]);
        setInputValue('');
      };
      const markBought = id => { setItems(items.map(i => i.id === id ? { ...i, status: 'stock', stockCount: Math.max(1, (i.stockCount || 0) + 1) } : i)); setActiveTab('stock'); };
      const markOut = id => { setItems(items.map(i => i.id === id ? { ...i, status: 'shopping', stockCount: 0 } : i)); setActiveTab('shopping'); };
      const updStock = (id, d) => setItems(items.map(i => i.id === id ? { ...i, stockCount: Math.max(0, (i.stockCount || 0) + d) } : i));
      const del = id => { if (window.confirm('削除しますか？')) setItems(items.filter(i => i.id !== id)); };
      const toggleCat = id => setCollapsed(p => ({ ...p, [id]: !p[id] }));

      const tabItems = items.filter(i => i.status === activeTab && (!search || i.text.includes(search)));
      const grouped = CATS.map(c => ({ ...c, items: tabItems.filter(i => (i.category || 'other') === c.id) }));
      const shoppingCount = items.filter(i => i.status === 'shopping').length;

      const SyncIcon = () => {
        if (syncStatus === 'saving') return <Loader2 size={14} className="spin text-[#8A8A70]" />;
        if (syncStatus === 'saved') return <Check size={14} className="text-green-500" />;
        if (syncStatus === 'error') return <CloudOff size={14} className="text-red-400" />;
        return (gasUrl && token ? <Cloud size={14} className="text-[#C8C8B0]" /> : <CloudOff size={14} className="text-[#C8C8B0]" />);
      };

      if (isLoading) return (
        <div className="max-w-md mx-auto flex flex-col items-center justify-center min-h-[60vh] text-[#8A8A70]">
          <Loader2 size={32} className="spin text-[#5A5A40] mb-3" />
          <p className="text-sm font-bold tracking-widest">Loading...</p>
        </div>
      );

      return (
        <div className="max-w-md mx-auto pb-24 select-none" onTouchStart={onTouchStart} onTouchMove={onTouchMove} onTouchEnd={onTouchEnd}>

          {/* Pull-to-refresh インジケーター */}
          <div className="ptr-indicator overflow-hidden flex items-center justify-center bg-[#F5F5F0]" style={{ height: pullY > 0 ? Math.min(pullY * 0.6, 54) : refreshing ? 48 : 0, opacity: pullY > 0 || refreshing ? 1 : 0 }}>
            <RotateCcw size={20} className={`text-[#5A5A40] ${(refreshing || pullY >= 70) ? 'spin' : ''}`} style={{ transform: !refreshing ? `rotate(${pullY * 3}deg)` : undefined }} />
            <span className="ml-2 text-xs font-bold text-[#5A5A40]">{pullY >= 70 || refreshing ? '更新中...' : '引いて更新'}</span>
          </div>

          {/* ヘッダー */}
          <div className="sticky top-0 z-10 bg-[#F5F5F0]/95 backdrop-blur-sm px-4 pt-4 pb-2">
            <div className="flex items-center justify-between mb-3">
              <div className="flex items-center gap-2">
                <span className="text-lg font-serif text-[#3A3A2C] font-bold">買い物・ストック</span>
                <SyncIcon />
              </div>
              <button onClick={() => setShowSettings(true)} className="p-2 rounded-xl bg-white border border-[#EBEBE0] text-[#8A8A70] hover:text-[#5A5A40] active:scale-90 transition-all shadow-sm">
                <Settings size={18} />
              </button>
            </div>

            {/* タブ */}
            <div className="flex bg-[#EBEBE0] p-1.5 rounded-2xl mb-3">
              {[['shopping', '🛒 買い物リスト', shoppingCount], ['stock', '📦 ストック', null]].map(([tab, label, cnt]) => (
                <button key={tab} onClick={() => setActiveTab(tab)}
                  className={`flex flex-1 items-center justify-center gap-1.5 py-2 text-xs font-bold rounded-xl transition-all ${activeTab === tab ? 'bg-white text-[#5A5A40] shadow-sm' : 'text-[#8A8A70]'}`}>
                  {label}{cnt > 0 && <span className="bg-[#5A5A40] text-white text-[10px] rounded-full px-1.5 py-0.5 leading-none">{cnt}</span>}
                </button>
              ))}
            </div>

            {/* 検索 */}
            <div className="relative mb-2">
              <Search size={14} className="absolute left-3 top-1/2 -translate-y-1/2 text-[#8A8A70]" />
              <input value={search} onChange={e => setSearch(e.target.value)} placeholder="検索..."
                className="w-full bg-white border border-[#EBEBE0] rounded-xl pl-8 pr-8 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-[#5A5A40] focus:border-transparent" />
              {search && <button onClick={() => setSearch('')} className="absolute right-3 top-1/2 -translate-y-1/2 text-[#8A8A70]"><X size={14} /></button>}
            </div>
          </div>

          <div className="px-4 space-y-2">
            {/* 追加フォーム */}
            <div className="bg-white rounded-2xl border border-[#EBEBE0] shadow-sm p-4 mb-4">
              <form onSubmit={handleAdd} className="flex gap-2 mb-2">
                <input value={inputValue} onChange={e => setInputValue(e.target.value)}
                  placeholder={activeTab === 'shopping' ? '買うものを入力...' : 'ストックに追加...'}
                  className="flex-1 border-2 border-dashed border-[#D9D9C8] rounded-xl px-3 py-2.5 text-sm focus:outline-none focus:ring-2 focus:ring-[#5A5A40] focus:border-transparent placeholder:text-[#8A8A70] placeholder:italic" />
                <button type="submit" disabled={!inputValue.trim()}
                  className="bg-[#5A5A40] text-white rounded-xl w-11 h-11 flex items-center justify-center flex-shrink-0 hover:bg-[#4A4A30] active:scale-95 transition-all disabled:opacity-40">
                  <Plus size={22} />
                </button>
              </form>
              {/* カテゴリー選択 */}
              <div className="flex gap-1.5 flex-wrap">
                {CATS.map(c => (
                  <button key={c.id} onClick={() => setSelCat(c.id)}
                    className={`text-[10px] px-2 py-1 rounded-lg font-bold transition-all ${selCat === c.id ? 'bg-[#5A5A40] text-white' : 'bg-[#F5F5F0] text-[#8A8A70] border border-[#EBEBE0]'}`}>
                    {c.label}
                  </button>
                ))}
              </div>
            </div>

            {/* カテゴリー別リスト */}
            {grouped.map(cat => {
              const isCollapsed = collapsed[cat.id];
              if (!cat.items.length && !search) return null;
              return (
                <div key={cat.id} className="fade-in">
                  {/* カテゴリーヘッダー */}
                  <button onClick={() => toggleCat(cat.id)}
                    className="w-full flex items-center justify-between px-3 py-2 rounded-xl hover:bg-[#EBEBE0] transition-colors">
                    <span className="text-xs font-bold text-[#5A5A40] tracking-wide">{cat.label}</span>
                    <div className="flex items-center gap-2">
                      {cat.items.length > 0 && <span className="text-[10px] bg-[#5A5A40] text-white rounded-full px-1.5 py-0.5 font-bold">{cat.items.length}</span>}
                      {isCollapsed ? <ChevronDown size={14} className="text-[#8A8A70]" /> : <ChevronUp size={14} className="text-[#8A8A70]" />}
                    </div>
                  </button>

                  {/* アイテム一覧 */}
                  {!isCollapsed && (
                    <div className="space-y-2 mt-1 mb-3">
                      {cat.items.length === 0 && (
                        <div className="text-center py-4 text-[#8A8A70] text-xs italic border border-dashed border-[#D9D9C8] rounded-xl">アイテムなし</div>
                      )}
                      {activeTab === 'shopping' && cat.items.map(item => (
                        <div key={item.id} className="group flex items-center gap-3 bg-white p-4 rounded-2xl shadow-sm border border-[#EBEBE0]">
                          <button onClick={() => markBought(item.id)} className="text-[#D9D9C8] hover:text-[#5A5A40] transition-colors flex-shrink-0 active:scale-90">
                            <Circle size={26} strokeWidth={1.5} />
                          </button>
                          <div className="flex-1 min-w-0">
                            <span className="font-medium text-[#4A4A30] break-words">{item.text}</span>
                            <span className="ml-2 text-[9px] bg-[#F9F9F5] border border-[#EBEBE0] text-[#8A8A70] rounded px-1.5 py-0.5 font-bold uppercase tracking-widest">要購入</span>
                          </div>
                          <button onClick={() => del(item.id)} className="text-[#C8C8B0] hover:text-[#8A8A70] p-1.5 rounded-lg hover:bg-[#F5F5F0] opacity-0 group-hover:opacity-100 transition-all active:scale-90 flex-shrink-0">
                            <Trash2 size={16} />
                          </button>
                        </div>
                      ))}
                      {activeTab === 'stock' && cat.items.map(item => (
                        <div key={item.id} className="group bg-white rounded-2xl shadow-sm border border-[#EBEBE0] p-4">
                          <div className="flex items-center gap-3">
                            <div className="flex-1 min-w-0">
                              <p className="font-medium text-[#4A4A30] break-words mb-2">{item.text}</p>
                              <div className="flex items-center gap-2">
                                <div className="flex items-center bg-[#F9F9F5] border border-[#D9D9C8] rounded-lg overflow-hidden">
                                  <button onClick={() => updStock(item.id, -1)} className="px-2.5 py-1.5 text-[#8A8A70] hover:bg-[#EBEBE0] active:bg-[#D9D9C8]"><Minus size={12} /></button>
                                  <span className="text-sm font-bold text-[#5A5A40] w-7 text-center">{item.stockCount || 0}</span>
                                  <button onClick={() => updStock(item.id, 1)} className="px-2.5 py-1.5 text-[#8A8A70] hover:bg-[#EBEBE0] active:bg-[#D9D9C8]"><Plus size={12} /></button>
                                </div>
                                <span className="text-[9px] uppercase font-bold tracking-widest text-[#8A8A70]">Stock</span>
                              </div>
                            </div>
                            <div className="flex flex-col items-end gap-2 flex-shrink-0">
                              <button onClick={() => del(item.id)} className="text-[#C8C8B0] hover:text-[#8A8A70] p-1.5 rounded-lg hover:bg-[#F5F5F0] opacity-0 group-hover:opacity-100 transition-all active:scale-90">
                                <Trash2 size={16} />
                              </button>
                              <button onClick={() => markOut(item.id)}
                                className="flex items-center gap-1.5 bg-white text-[#5A5A40] px-3 py-2 rounded-xl border-2 border-[#EBEBE0] hover:border-[#5A5A40] hover:bg-[#F9F9F5] active:scale-95 transition-all text-xs font-bold">
                                <ShoppingCart size={13} /><span>欠品</span><ArrowRight size={11} className="opacity-40" />
                              </button>
                            </div>
                          </div>
                        </div>
                      ))}
                    </div>
                  )}
                </div>
              );
            })}

            {/* 全体が空の場合 */}
            {tabItems.length === 0 && !search && (
              <div className="text-center py-16 text-[#8A8A70] flex flex-col items-center gap-3">
                {activeTab === 'shopping' ? <ShoppingBag size={48} className="opacity-20" /> : <Package size={48} className="opacity-20" />}
                <p className="font-medium text-[#5A5A40]">{activeTab === 'shopping' ? '買うものはありません' : 'ストックは空です'}</p>
                <p className="text-xs italic">{activeTab === 'shopping' ? 'ストックから「欠品」にするか追加してください' : '家にある日用品を追加してください'}</p>
              </div>
            )}
          </div>

          {/* 設定モーダル */}
          {showSettings && <SettingsModal settings={settings} onSave={saveSettings} onClose={() => setShowSettings(false)} />}
        </div>
      );
    }

    createRoot(document.getElementById('root')).render(<App />);
  </script>

  <script>
    if ('serviceWorker' in navigator) {
      window.addEventListener('load', () => {
        navigator.serviceWorker.register('/shopping-stock-list/sw.js', { scope: '/shopping-stock-list/' }).catch(console.error);
      });
    }
  </script>
</body>

</html>
