<!DOCTYPE html>
<html lang="ja">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <title>買い物リスト</title>
  <link rel="manifest" href="/shopping-stock-list/manifest.webmanifest">
  <meta name="theme-color" content="#5A5A40">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <link rel="apple-touch-icon" href="/shopping-stock-list/icons/icon-192v2.png">
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <script type="importmap">{"imports":{"react":"https://esm.sh/react@18.2.0","react-dom/client":"https://esm.sh/react-dom@18.2.0/client","lucide-react":"https://esm.sh/lucide-react@0.344.0?external=react,react-dom"}}</script>
  <style>
    body {
      font-family: 'Helvetica Neue', Arial, 'Hiragino Kaku Gothic ProN', 'Hiragino Sans', Meiryo, sans-serif;
      -webkit-tap-highlight-color: transparent;
      overscroll-behavior-y: contain;
      overflow-x: hidden;
    }
    ::-webkit-scrollbar { width: 6px }
    ::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 10px }
    @keyframes spin { to { transform: rotate(360deg) } }
    .spin { animation: spin 1s linear infinite }
    @keyframes fadeIn { from { opacity: 0; transform: translateY(-6px) } to { opacity: 1; transform: translateY(0) } }
    .fade-in { animation: fadeIn .2s ease-out }
    /* FIX: slideUp キーフレーム追加（設定モーダル用） */
    @keyframes slideUp { from { transform: translateY(100%) } to { transform: translateY(0) } }
    .ptr-indicator { transition: height .15s ease }
    .view-container { display: flex; width: 200%; will-change: transform; transition: transform 0.3s cubic-bezier(0.16, 1, 0.3, 1); }
    .view-pane { width: 50%; flex-shrink: 0; overflow-y: auto; }
    /* CDN読み込み中のインラインスタイル */
    #loading-fallback {
      display: flex; flex-direction: column; align-items: center; justify-content: center;
      min-height: 80vh; color: #8A8A70;
    }
    #loading-fallback .fb-spinner {
      width: 32px; height: 32px; border: 3px solid #D9D9C8; border-top-color: #5A5A40;
      border-radius: 50%; animation: spin 1s linear infinite; margin-bottom: 12px;
    }
  </style>
</head>

<body class="bg-[#F5F5F0] min-h-screen text-[#4A4A40]">
  <!-- FIX: CDN読み込み完了前に表示するフォールバックUI -->
  <div id="root">
    <div id="loading-fallback">
      <div class="fb-spinner"></div>
      <p style="font-size:14px;font-weight:bold;">読み込み中...</p>
    </div>
  </div>

  <!-- FIX: CDN/Babel読み込みタイムアウト検知（12秒） -->
  <script>
    window.__appReady = false;
    window.__appTimeout = setTimeout(function () {
      if (!window.__appReady) {
        var el = document.getElementById('loading-fallback');
        if (el) {
          el.innerHTML =
            '<p style="font-size:16px;font-weight:bold;margin-bottom:8px;">⚠️ 読み込みに失敗しました</p>' +
            '<p style="font-size:12px;margin-bottom:16px;color:#8A8A70;">ネットワーク接続を確認してください</p>' +
            '<button onclick="location.reload()" style="background:#5A5A40;color:white;border:none;padding:12px 28px;border-radius:12px;font-weight:bold;font-size:14px;cursor:pointer;">リロード</button>';
        }
      }
    }, 12000);
  </script>

  <script type="text/babel" data-type="module">
    import React, { useState, useEffect, useRef, useCallback, useMemo, Component } from 'react';
    import { createRoot } from 'react-dom/client';
    import { Trash2, Plus, ShoppingBag, Circle, Package, Minus, ShoppingCart, Loader2, Settings, RotateCcw, Search, X, Cloud, CloudOff, Check } from 'lucide-react';

    /* ================================================================
       定数
       ================================================================ */
    const DEFAULT_GAS_URL = 'https://script.google.com/macros/s/AKfycbxyzCdPHg6TOnEvlAeMPh_8g1WpNSEYGFhM4R5iEMUHlASNPVVazQYaAOW7FC2B42-w/exec';
    const DEFAULT_TOKEN = 'baby2026';
    const GAS_TIMEOUT_MS = 5000;
    const SAVE_DEBOUNCE_MS = 1200;
    const LS_KEY_ITEMS = 'shopping-list';
    const LS_KEY_SETTINGS = 'app-settings';

    const CATS = [
      { id: 'vegetables', label: '🥦 野菜・果物' },
      { id: 'meat', label: '🥩 肉・魚・卵' },
      { id: 'dairy', label: '🥛 乳製品・パン' },
      { id: 'staple', label: '🍚 米・麺・乾物' },
      { id: 'drinks', label: '🥤 飲み物' },
      { id: 'snacks', label: '🍬 お菓子・デザート' },
      { id: 'frozen', label: '🧊 冷凍食品' },
      { id: 'seasoning', label: '🧂 調味料・食材' },
      { id: 'daily', label: '🧹 日用品・消耗品' },
      { id: 'baby', label: '👶 ベビー用品' },
      { id: 'other', label: '📦 その他' },
    ];

    /* ================================================================
       ユーティリティ
       ================================================================ */
    const genId = () => {
      try { return crypto.randomUUID(); }
      catch { return Date.now().toString(36) + Math.random().toString(36).substr(2); }
    };

    const safeJsonParse = (str, fallback) => {
      try { return JSON.parse(str); } catch { return fallback; }
    };

    const loadSettings = () => {
      const s = localStorage.getItem(LS_KEY_SETTINGS);
      return s ? safeJsonParse(s, { gasUrl: DEFAULT_GAS_URL, token: DEFAULT_TOKEN })
               : { gasUrl: DEFAULT_GAS_URL, token: DEFAULT_TOKEN };
    };

    const migrateItem = (item) => ({
      id: item.id || genId(),
      text: item.text || '',
      status: item.status || (item.checked ? 'stock' : 'shopping'),
      stockCount: item.stockCount ?? (item.checked ? 1 : 0),
      category: item.category || 'other',
    });

    const loadFromLS = () => {
      const s = localStorage.getItem(LS_KEY_ITEMS);
      if (s) {
        const d = safeJsonParse(s, null);
        if (Array.isArray(d) && d.length) return d.map(migrateItem);
      }
      return [{ id: genId(), text: '牛乳', status: 'shopping', stockCount: 0, category: 'dairy' }];
    };

    const saveToLS = (items) => {
      try { localStorage.setItem(LS_KEY_ITEMS, JSON.stringify(items)); }
      catch (e) { console.warn('LS保存失敗:', e); }
    };

    // FIX: AbortController をクリーンに管理する fetch ラッパー
    const fetchWithTimeout = async (url, options = {}, timeoutMs = GAS_TIMEOUT_MS) => {
      const controller = new AbortController();
      const tid = setTimeout(() => controller.abort(), timeoutMs);
      try {
        return await fetch(url, { ...options, signal: controller.signal });
      } finally {
        clearTimeout(tid);
      }
    };

    const sendNotif = (title, body) => {
      try {
        if ('serviceWorker' in navigator && Notification.permission === 'granted') {
          navigator.serviceWorker.ready
            .then(reg => reg.showNotification(title, { body, icon: '/shopping-stock-list/icons/icon-192v2.png' }))
            .catch(() => {});
        }
      } catch { /* 通知失敗は無視 */ }
    };

    /* ================================================================
       ErrorBoundary — あらゆるレンダリングエラーをキャッチ
       ================================================================ */
    class ErrorBoundary extends Component {
      constructor(props) { super(props); this.state = { hasError: false, error: null }; }
      static getDerivedStateFromError(error) { return { hasError: true, error }; }
      componentDidCatch(error, info) { console.error('ErrorBoundary:', error, info); }
      render() {
        if (this.state.hasError) {
          return (
            <div className="flex flex-col items-center justify-center min-h-[80vh] px-6 text-center text-[#8A8A70]">
              <p className="text-lg font-bold mb-2">⚠️ エラーが発生しました</p>
              <p className="text-xs mb-4 max-w-xs break-all opacity-60">{String(this.state.error?.message || '')}</p>
              <button onClick={() => location.reload()}
                className="bg-[#5A5A40] text-white px-6 py-3 rounded-xl font-bold text-sm">リロード</button>
            </div>
          );
        }
        return this.props.children;
      }
    }

    /* ================================================================
       子コンポーネント
       ================================================================ */
    function SettingsModal({ settings, onSave, onClose }) {
      const [url, setUrl] = useState(settings.gasUrl);
      const [tok, setTok] = useState(settings.token);
      const [show, setShow] = useState(false);
      return (
        <div className="fixed inset-0 z-50 flex items-end bg-black/30" onClick={onClose}>
          <div className="w-full max-w-md mx-auto bg-white rounded-t-3xl p-6 shadow-2xl"
               onClick={e => e.stopPropagation()} style={{ animation: 'slideUp 0.25s ease-out' }}>
            <div className="flex items-center justify-between mb-5">
              <h2 className="font-bold text-[#3A3A2C] text-lg">⚙️ 接続設定</h2>
              <button onClick={onClose} className="text-[#8A8A70] p-1"><X size={20} /></button>
            </div>
            <label className="block text-[10px] font-bold tracking-widest text-[#8A8A70] uppercase mb-1">GAS URL</label>
            <textarea value={url} onChange={e => setUrl(e.target.value)} rows={3}
              className="w-full border-2 border-[#D9D9C8] rounded-xl px-3 py-2 text-xs mb-4 focus:outline-none focus:ring-2 focus:ring-[#5A5A40] resize-none" />
            <label className="block text-[10px] font-bold tracking-widest text-[#8A8A70] uppercase mb-1">アクセストークン</label>
            <div className="relative mb-5">
              <input type={show ? 'text' : 'password'} value={tok} onChange={e => setTok(e.target.value)}
                className="w-full border-2 border-[#D9D9C8] rounded-xl px-3 py-2.5 text-sm pr-14 focus:outline-none focus:ring-2 focus:ring-[#5A5A40]" />
              <button onClick={() => setShow(!show)}
                className="absolute right-3 top-1/2 -translate-y-1/2 text-xs text-[#5A5A40] font-bold">{show ? '隠す' : '表示'}</button>
            </div>
            <button onClick={() => onSave({ gasUrl: url.trim(), token: tok.trim() })}
              className="w-full bg-[#5A5A40] text-white py-3 rounded-xl font-bold text-sm hover:bg-[#4A4A30]">保存して再接続</button>
          </div>
        </div>
      );
    }

    function SyncIcon({ status, connected }) {
      if (status === 'saving') return <Loader2 size={14} className="spin text-[#8A8A70]" />;
      if (status === 'saved')  return <Check size={14} className="text-green-500" />;
      if (status === 'error')  return <CloudOff size={14} className="text-red-400" />;
      return connected
        ? <Cloud size={14} className="text-[#C8C8B0]" />
        : <CloudOff size={14} className="text-[#C8C8B0]" />;
    }

    function AddForm({ inputValue, setInputValue, selCat, setSelCat, onSubmit, placeholder }) {
      return (
        <div className="bg-white rounded-2xl border border-[#EBEBE0] shadow-sm p-4 mb-4">
          <form onSubmit={onSubmit} className="flex gap-2 mb-2">
            <input value={inputValue} onChange={e => setInputValue(e.target.value)} placeholder={placeholder}
              className="flex-1 border-2 border-dashed border-[#D9D9C8] rounded-xl px-3 py-2.5 text-sm focus:outline-none" />
            <button type="submit"
              className="bg-[#5A5A40] text-white rounded-xl w-11 h-11 flex items-center justify-center active:scale-95 flex-shrink-0">
              <Plus size={22} />
            </button>
          </form>
          <div className="flex gap-1.5 flex-wrap">
            {CATS.map(c => (
              <button key={c.id} onClick={() => setSelCat(c.id)}
                className={`text-[10px] px-2 py-1 rounded-lg font-bold transition-all ${selCat === c.id ? 'bg-[#5A5A40] text-white' : 'bg-[#F5F5F0] text-[#8A8A70]'}`}>
                {c.label}
              </button>
            ))}
          </div>
        </div>
      );
    }

    /* ================================================================
       App 本体
       ================================================================ */
    function App() {
      /* ---- State（フック規則: すべて先頭に集約、条件分岐前に配置） ---- */
      const [settings, setSettings]       = useState(loadSettings);
      const [items, setItems]             = useState([]);
      const [isLoading, setIsLoading]     = useState(true);
      const [syncStatus, setSyncStatus]   = useState('idle');
      const [activeTab, setActiveTab]     = useState('shopping');
      const [inputValue, setInputValue]   = useState('');
      const [selCat, setSelCat]           = useState('other');
      const [showSettings, setShowSettings] = useState(false);
      const [collapsed, setCollapsed]     = useState({});
      const [search, setSearch]           = useState('');
      const [pullY, setPullY]             = useState(0);
      const [refreshing, setRefreshing]   = useState(false);

      /* ---- Refs ---- */
      const isInitSave   = useRef(true);
      const touchStartY  = useRef(0);
      const touchStartX  = useRef(0);
      const swipeDir     = useRef(null);
      const containerRef = useRef(null);
      const saveTimerRef = useRef(null);

      const { gasUrl, token } = settings;
      const isConnected = Boolean(gasUrl && token);

      /* ---- データ読み込み（GAS → LS フォールバック） ---- */
      const loadData = useCallback(async () => {
        setIsLoading(true);
        let loaded = false;
        if (isConnected) {
          try {
            const res = await fetchWithTimeout(`${gasUrl}?token=${token}`);
            const data = await res.json();
            if (data.error) throw new Error(data.error);
            if (Array.isArray(data) && data.length) {
              const migrated = data.map(migrateItem);
              setItems(migrated);
              saveToLS(migrated); // FIX: ローカルにもバックアップ
              loaded = true;
            }
          } catch (e) { console.warn('GAS通信失敗、ローカルにフォールバック:', e.message); }
        }
        if (!loaded) setItems(loadFromLS());
        setIsLoading(false);
      }, [gasUrl, token, isConnected]);

      /* ---- 初回読み込み ---- */
      useEffect(() => { loadData(); }, [loadData]);

      /* ---- 自動保存（LS即時 + GASデバウンス） ---- */
      useEffect(() => {
        if (isLoading) return;
        if (isInitSave.current) { isInitSave.current = false; return; }

        // FIX: ローカルには即座に保存（通信失敗時のデータ保護）
        saveToLS(items);
        setSyncStatus('saving');

        if (saveTimerRef.current) clearTimeout(saveTimerRef.current);
        saveTimerRef.current = setTimeout(async () => {
          if (isConnected) {
            try {
              await fetchWithTimeout(gasUrl, {
                method: 'POST',
                headers: { 'Content-Type': 'text/plain' },
                body: JSON.stringify({ token, data: JSON.stringify(items) }),
              }, 8000);
              setSyncStatus('saved');
            } catch (e) {
              console.warn('GAS保存失敗:', e.message);
              setSyncStatus('error');
            }
          } else {
            setSyncStatus('saved');
          }
          setTimeout(() => setSyncStatus('idle'), 2000);
        }, SAVE_DEBOUNCE_MS);

        return () => { if (saveTimerRef.current) clearTimeout(saveTimerRef.current); };
      }, [items, isLoading, gasUrl, token, isConnected]); // FIX: 依存配列を正しく指定

      /* ---- タブ切り替え時のコンテナ位置補正 ---- */
      useEffect(() => {
        if (containerRef.current) {
          containerRef.current.style.transition = 'transform 0.3s cubic-bezier(0.16, 1, 0.3, 1)';
          containerRef.current.style.transform = `translateX(${activeTab === 'shopping' ? 0 : -50}%)`;
        }
      }, [activeTab]);

      /* ---- 通知許可リクエスト ---- */
      useEffect(() => {
        try { if (Notification.permission === 'default') Notification.requestPermission(); } catch {}
      }, []);

      /* ---- タッチ操作（useCallback で安定化） ---- */
      const onTouchStart = useCallback((e) => {
        touchStartY.current = e.touches[0].clientY;
        touchStartX.current = e.touches[0].clientX;
        swipeDir.current = null;
        if (containerRef.current) containerRef.current.style.transition = 'none';
      }, []);

      const onTouchMove = useCallback((e) => {
        const dx = e.touches[0].clientX - touchStartX.current;
        const dy = e.touches[0].clientY - touchStartY.current;
        if (!swipeDir.current) {
          if (Math.abs(dx) > Math.abs(dy) + 10) swipeDir.current = 'h';
          else if (Math.abs(dy) > Math.abs(dx) + 10) swipeDir.current = 'v';
          else return;
        }
        if (swipeDir.current === 'h' && containerRef.current) {
          const baseOffset = activeTab === 'shopping' ? 0 : -50;
          const movePercent = (dx / window.innerWidth) * 50;
          const isEdge = (activeTab === 'shopping' && dx > 0) || (activeTab === 'stock' && dx < 0);
          containerRef.current.style.transform = `translateX(${baseOffset + (isEdge ? movePercent * 0.2 : movePercent)}%)`;
        }
        if (swipeDir.current === 'v' && window.scrollY <= 5 && dy > 0) {
          setPullY(Math.min(dy, 90));
        }
      }, [activeTab]);

      const onTouchEnd = useCallback(async (e) => {
        const dx = e.changedTouches[0].clientX - touchStartX.current;
        if (containerRef.current) {
          containerRef.current.style.transition = 'transform 0.3s cubic-bezier(0.16, 1, 0.3, 1)';
        }
        if (swipeDir.current === 'h') {
          const snapBack = () => {
            if (containerRef.current) containerRef.current.style.transform = `translateX(${activeTab === 'shopping' ? 0 : -50}%)`;
          };
          if (Math.abs(dx) > 80) {
            if (dx < 0 && activeTab === 'shopping') setActiveTab('stock');
            else if (dx > 0 && activeTab === 'stock') setActiveTab('shopping');
            else snapBack();
          } else { snapBack(); }
        }
        if (swipeDir.current === 'v' && pullY >= 70) {
          setRefreshing(true);
          await loadData();
          setRefreshing(false);
        }
        setPullY(0);
        swipeDir.current = null;
      }, [activeTab, pullY, loadData]);

      /* ---- アクション（FIX: 関数型 setItems で stale state 防止） ---- */
      const handleAdd = useCallback((e) => {
        e.preventDefault();
        const t = inputValue.trim();
        if (!t) return;
        const newItem = { id: genId(), text: t, status: activeTab, stockCount: activeTab === 'stock' ? 1 : 0, category: selCat };
        setItems(prev => [newItem, ...prev]);
        setInputValue('');
        sendNotif('追加しました', t);
      }, [inputValue, activeTab, selCat]);

      const markBought = useCallback((id) => {
        setItems(prev => {
          const item = prev.find(i => i.id === id);
          if (item) sendNotif('購入しました', item.text);
          return prev.map(i => i.id === id ? { ...i, status: 'stock', stockCount: Math.max(1, (i.stockCount || 0) + 1) } : i);
        });
        setActiveTab('stock');
      }, []);

      const markOut = useCallback((id) => {
        setItems(prev => {
          const item = prev.find(i => i.id === id);
          if (item) sendNotif('欠品登録', item.text);
          return prev.map(i => i.id === id ? { ...i, status: 'shopping', stockCount: 0 } : i);
        });
        setActiveTab('shopping');
      }, []);

      const updStock = useCallback((id, d) => {
        setItems(prev => prev.map(i => i.id === id ? { ...i, stockCount: Math.max(0, (i.stockCount || 0) + d) } : i));
      }, []);

      const del = useCallback((id) => {
        if (window.confirm('削除しますか？')) setItems(prev => prev.filter(i => i.id !== id));
      }, []);

      const toggleCat = useCallback((id) => {
        setCollapsed(p => ({ ...p, [id]: !p[id] }));
      }, []);

      // FIX: saveSettings を正しく定義
      const saveSettings = useCallback((newSettings) => {
        try { localStorage.setItem(LS_KEY_SETTINGS, JSON.stringify(newSettings)); } catch {}
        setSettings(newSettings);
        setShowSettings(false);
        isInitSave.current = true; // 設定変更後の初回保存スキップ（GASから再読み込みするため）
      }, []);

      /* ---- 派生データ（メモ化） ---- */
      const shoppingCount = useMemo(() => items.filter(i => i.status === 'shopping').length, [items]);

      /* ---- ローディング画面（全フックの後に配置） ---- */
      if (isLoading) {
        return (
          <div className="flex flex-col items-center justify-center min-h-[80vh] text-[#8A8A70]">
            <Loader2 size={32} className="spin text-[#5A5A40] mb-3" />
            <p className="text-sm font-bold">Loading...</p>
          </div>
        );
      }

      /* ---- リスト描画 ---- */
      const renderList = (type) => {
        const filtered = items.filter(i => i.status === type && (!search || i.text.includes(search)));
        if (filtered.length === 0 && !search) {
          return (
            <div className="text-center py-20 opacity-30">
              {type === 'shopping' ? <ShoppingBag size={64} className="mx-auto" /> : <Package size={64} className="mx-auto" />}
              <p className="text-sm font-bold mt-4">{type === 'shopping' ? '買うものはありません' : 'ストックは空です'}</p>
            </div>
          );
        }
        return CATS.map(cat => {
          const catItems = filtered.filter(i => (i.category || 'other') === cat.id);
          if (!catItems.length) return null;
          return (
            <div key={cat.id} className="mb-1">
              <button onClick={() => toggleCat(cat.id)} className="w-full flex items-center justify-between px-3 py-2 rounded-xl">
                <span className="text-xs font-bold text-[#5A5A40] opacity-70 tracking-wide">{cat.label}</span>
                <span className="text-[10px] bg-[#5A5A40]/10 text-[#5A5A40] rounded-full px-2 py-0.5 font-bold">{catItems.length}</span>
              </button>
              {!collapsed[cat.id] && (
                <div className="space-y-1.5 mt-1 mb-2 px-1">
                  {catItems.map(item => (
                    <div key={item.id} className="group flex items-center gap-2 bg-white px-3 py-2 rounded-xl shadow-sm border border-[#EBEBE0]">
                      {type === 'shopping' ? (
                        <>
                          <button onClick={() => markBought(item.id)} className="text-[#D9D9C8] active:scale-90 flex-shrink-0"><Circle size={20} /></button>
                          <span className="flex-1 text-sm font-medium text-[#4A4A30] truncate">{item.text}</span>
                        </>
                      ) : (
                        <>
                          <span className="flex-1 text-sm font-medium text-[#4A4A30] truncate">{item.text}</span>
                          <div className="flex items-center bg-[#F9F9F5] border border-[#D9D9C8] rounded-lg overflow-hidden flex-shrink-0">
                            <button onClick={() => updStock(item.id, -1)} className="px-2 py-1 text-[#8A8A70] active:bg-[#D9D9C8]"><Minus size={11} /></button>
                            <span className="text-xs font-bold text-[#5A5A40] w-6 text-center">{item.stockCount || 0}</span>
                            <button onClick={() => updStock(item.id, 1)} className="px-2 py-1 text-[#8A8A70] active:bg-[#D9D9C8]"><Plus size={11} /></button>
                          </div>
                          <button onClick={() => markOut(item.id)}
                            className="flex items-center gap-1 text-[#5A5A40] px-2 py-1 rounded-lg border border-[#EBEBE0] text-[10px] font-bold flex-shrink-0">
                            <ShoppingCart size={11} /><span>欠品</span>
                          </button>
                        </>
                      )}
                      <button onClick={() => del(item.id)}
                        className="text-[#C8C8B0] hover:text-red-400 p-1 opacity-0 group-hover:opacity-100 active:scale-90 flex-shrink-0">
                        <Trash2 size={14} />
                      </button>
                    </div>
                  ))}
                </div>
              )}
            </div>
          );
        });
      };

      /* ---- メインレンダリング ---- */
      return (
        <div className="max-w-md mx-auto min-h-screen flex flex-col"
          onTouchStart={onTouchStart} onTouchMove={onTouchMove} onTouchEnd={onTouchEnd}>

          {/* Pull-to-Refresh */}
          <div className="ptr-indicator flex items-center justify-center bg-[#F5F5F0] overflow-hidden"
            style={{ height: pullY > 0 ? Math.min(pullY * 0.6, 54) : refreshing ? 48 : 0 }}>
            {(pullY > 0 || refreshing) && <RotateCcw size={20} className="text-[#5A5A40] spin" />}
          </div>

          {/* ヘッダー */}
          <div className="sticky top-0 z-20 bg-[#F5F5F0]/95 backdrop-blur-sm px-4 pt-4 pb-2">
            <div className="flex items-center justify-between mb-3">
              <div className="flex items-center gap-2">
                <span className="text-lg font-serif text-[#3A3A2C] font-bold tracking-tight">買い物・ストック</span>
                <SyncIcon status={syncStatus} connected={isConnected} />
              </div>
              <button onClick={() => setShowSettings(true)}
                className="p-2 rounded-xl bg-white border border-[#EBEBE0] text-[#8A8A70] shadow-sm active:scale-90">
                <Settings size={18} />
              </button>
            </div>

            {/* タブ */}
            <div className="flex bg-[#EBEBE0] p-1.5 rounded-2xl mb-3">
              {['shopping', 'stock'].map(t => (
                <button key={t} onClick={() => setActiveTab(t)}
                  className={`flex-1 py-2 text-xs font-bold rounded-xl transition-all ${activeTab === t ? 'bg-white text-[#5A5A40] shadow-sm' : 'text-[#8A8A70]'}`}>
                  {t === 'shopping' ? '🛒 買い物' : '📦 ストック'}
                  {t === 'shopping' && shoppingCount > 0 && (
                    <span className="ml-1.5 bg-[#5A5A40] text-white text-[10px] rounded-full px-1.5 py-0.5">{shoppingCount}</span>
                  )}
                </button>
              ))}
            </div>

            {/* 検索 */}
            <div className="relative mb-2">
              <Search size={14} className="absolute left-3 top-1/2 -translate-y-1/2 text-[#8A8A70]" />
              <input value={search} onChange={e => setSearch(e.target.value)} placeholder="検索..."
                className="w-full bg-white border border-[#EBEBE0] rounded-xl pl-8 pr-8 py-2 text-sm focus:outline-none" />
              {search && (
                <button onClick={() => setSearch('')} className="absolute right-3 top-1/2 -translate-y-1/2 text-[#8A8A70]">
                  <X size={14} />
                </button>
              )}
            </div>
          </div>

          {/* メインコンテンツ（スワイプ対応） */}
          <div className="flex-1 relative overflow-hidden">
            <div ref={containerRef} className="view-container"
              style={{ transform: `translateX(${activeTab === 'shopping' ? 0 : -50}%)` }}>
              <div className="view-pane px-4 pb-24">
                <AddForm inputValue={inputValue} setInputValue={setInputValue}
                  selCat={selCat} setSelCat={setSelCat} onSubmit={handleAdd} placeholder="買い物に追加..." />
                {renderList('shopping')}
              </div>
              <div className="view-pane px-4 pb-24">
                <AddForm inputValue={inputValue} setInputValue={setInputValue}
                  selCat={selCat} setSelCat={setSelCat} onSubmit={handleAdd} placeholder="ストックに追加..." />
                {renderList('stock')}
              </div>
            </div>
          </div>

          {/* 設定モーダル */}
          {showSettings && (
            <SettingsModal settings={settings} onSave={saveSettings} onClose={() => setShowSettings(false)} />
          )}
        </div>
      );
    }

    /* ================================================================
       マウント & Service Worker 登録
       ================================================================ */
    window.__appReady = true;
    clearTimeout(window.__appTimeout);

    createRoot(document.getElementById('root')).render(
      <ErrorBoundary><App /></ErrorBoundary>
    );

if ('serviceWorker' in navigator) {
  window.addEventListener('load', () => {
    navigator.serviceWorker.register('/shopping-stock-list/sw.js').catch(e => console.warn('SW登録失敗:', e));
  });
  // ★ SW更新時に自動リロード
  navigator.serviceWorker.addEventListener('controllerchange', () => {
    if (!window.__swReloading) {
      window.__swReloading = true;
      location.reload();
    }
  });
  // ★ SW からの更新通知を受信（ログ用）
  navigator.serviceWorker.addEventListener('message', (event) => {
    if (event.data?.type === 'SW_UPDATED') {
      console.log('[App] SW updated to:', event.data.version);
    }
  });
}  
</script>
</body>
</html>
